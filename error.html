  <!--==============================
      Component loader
      Carga nav.html y footer.html, marca el link activo,
      reinicia el menú móvil y escribe el año del copyright.
    ==============================-->
    <script>
      (function () {

        function load(url, targetId, onDone) {
          fetch(url)
            .then(function (r) {
              if (!r.ok) throw new Error(url + ' responded ' + r.status);
              return r.text();
            })
            .then(function (html) {
              document.getElementById(targetId).innerHTML = html;
              if (typeof onDone === 'function') onDone();
            })
            .catch(function (e) {
              console.warn('Could not load ' + url + ':', e);
            });
        }

        function markActive() {
          var path = window.location.pathname;
          ['#site-nav .main-menu a', '#site-nav .mobile-menu a'].forEach(function (sel) {
            document.querySelectorAll(sel).forEach(function (a) {
              var href = a.getAttribute('href');
              var active =
                href === path ||
                (href === '/portfolio.html' && path.indexOf('/portfolio') === 0);
              if (active) a.closest('li').classList.add('active');
            });
          });
        }

        function initMobileMenu() {
          if (typeof jQuery !== 'undefined' && jQuery.fn.mobilemenu) {
            jQuery('.mobile-menu-wrapper').mobilemenu();
          }
        }

        function writeYear() {
          document.querySelectorAll('.footer-year').forEach(function (el) {
            el.textContent = new Date().getFullYear();
          });
        }

        load('/nav.html', 'site-nav', function () {
          markActive();
          initMobileMenu();
        });

        load('/footer.html', 'site-footer', function () {
          writeYear();
        });

      })();
    </script>
